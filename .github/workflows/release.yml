name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  GITHUB_REGISTRY: ghcr.io
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: "coollabsio/maxio"
  UI_IMAGE_NAME: "coollabsio/maxio-ui"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: maxio-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: maxio-linux-arm64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: maxio-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: Check tag matches Cargo version
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="$(python3 - <<'PYV'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PYV
          )"
          test "${TAG#v}" = "$VERSION" || { echo "Cargo version $VERSION does not match tag $TAG"; exit 1; }

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all --all-features

      - name: Build frontend
        run: bun run build
        working-directory: ui

      - name: Configure linker (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build binaries
        run: |
          cargo build --release --locked --target ${{ matrix.target }} -p maxio -p maxio-admin -p maxio-ui

      - name: Package
        run: |
          VERSION="$(python3 - <<'PYV'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PYV
          )"
          ARCHIVE="${{ matrix.artifact }}-${VERSION}.tar.gz"
          cp target/${{ matrix.target }}/release/maxio maxio
          cp target/${{ matrix.target }}/release/maxio-admin maxio-admin
          cp target/${{ matrix.target }}/release/maxio-ui maxio-ui
          tar czf "${ARCHIVE}" maxio maxio-admin maxio-ui
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}

  offline-bundle:
    name: Offline bundle ${{ matrix.arch }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Build offline bundle
        run: bash scripts/build-offline-bundle.sh

      - name: Upload offline bundle
        uses: actions/upload-artifact@v4
        with:
          name: offline-bundle-${{ matrix.arch }}
          path: |
            dist/offline-bundle/*.tar.gz
            dist/offline-bundle/*.sha256

  offline-images:
    name: Offline images ${{ matrix.arch }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build offline image pack
        run: bash scripts/build-offline-images.sh

      - name: Upload offline images
        uses: actions/upload-artifact@v4
        with:
          name: offline-images-${{ matrix.arch }}
          path: |
            dist/offline-images/*.tar
            dist/offline-images/*.sha256
            dist/offline-images/images.txt

  docker:
    name: Docker ${{ matrix.image }} ${{ matrix.arch }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - image: maxio
            dockerfile: Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: maxio
            dockerfile: Dockerfile
            arch: aarch64
            platform: linux/aarch64
            runner: ubuntu-24.04-arm
          - image: maxio-ui
            dockerfile: Dockerfile.ui
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: maxio-ui
            dockerfile: Dockerfile.ui
            arch: aarch64
            platform: linux/aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Login to ${{ env.GITHUB_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ${{ env.DOCKER_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="$(python3 - <<'PYV'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PYV
          )"
          test "${TAG#v}" = "$VERSION" || { echo "Cargo version $VERSION does not match tag $TAG"; exit 1; }
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Resolve image name
        id: image
        run: |
          if [[ "${{ matrix.image }}" == "maxio-ui" ]]; then
            echo "name=${{ env.UI_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Image (${{ matrix.image }} ${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            MAXIO_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
            ${{ env.GITHUB_REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}

  docker-manifest:
    name: Docker Manifest
    needs: [build, docker]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - image: maxio
            name: coollabsio/maxio
          - image: maxio-ui
            name: coollabsio/maxio-ui
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to ${{ env.GITHUB_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ${{ env.DOCKER_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="$(python3 - <<'PYV'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PYV
          )"
          test "${TAG#v}" = "$VERSION" || { echo "Cargo version $VERSION does not match tag $TAG"; exit 1; }
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create & publish manifest on ${{ env.GITHUB_REGISTRY }}
        run: |
          docker buildx imagetools create \
          ${{ env.GITHUB_REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}-amd64 \
          ${{ env.GITHUB_REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}-aarch64 \
          --tag ${{ env.GITHUB_REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }} \
          --tag ${{ env.GITHUB_REGISTRY }}/${{ matrix.name }}:latest

      - name: Create & publish manifest on ${{ env.DOCKER_REGISTRY }}
        run: |
          docker buildx imagetools create \
          ${{ env.DOCKER_REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}-amd64 \
          ${{ env.DOCKER_REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}-aarch64 \
          --tag ${{ env.DOCKER_REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }} \
          --tag ${{ env.DOCKER_REGISTRY }}/${{ matrix.name }}:latest

  release:
    name: Create Release
    needs: [build, offline-bundle, offline-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: maxio-*|offline-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            *.tar.gz
            *.sha256
            *.tar