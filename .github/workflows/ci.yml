name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features

      - name: Frontend typecheck
        run: bun run check
        working-directory: ui

      - name: Build frontend
        run: bun run build
        working-directory: ui

  licenses:
    name: License audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: Check Rust dependency licenses
        run: cargo deny check licenses

      - name: Check npm dependency licenses (ui/)
        run: bash scripts/check-npm-licenses.sh

      - name: Raft library spike smoke (P1-16)
        run: cargo test -p maxio-storage --features raft-spike raft_spike

      - name: Storage Raft module tests (P1-17)
        run: cargo test -p maxio-storage --features raft raft::

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Unit test coverage summary
        run: |
          cargo llvm-cov --workspace --lib --all-features --summary-only | tee coverage-summary.txt

      - name: Enforce per-module coverage floors
        run: bash scripts/check-coverage-floors.sh coverage-summary.txt

  aws-cli:
    name: AWS CLI compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: Install AWS CLI
        run: pip install awscli

      - name: Build maxio
        run: cargo build --release

      - name: Run AWS CLI integration tests
        run: |
          DATA_DIR=$(mktemp -d)
          PORT=19000
          ./target/release/maxio \
            --data-dir "$DATA_DIR" \
            --port "$PORT" \
            --address 127.0.0.1 \
            --erasure-coding \
            --chunk-size 1048576 \
            --allow-insecure-dev &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PORT}/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:${PORT}/healthz" >/dev/null

          ./tests/aws_cli_test.sh "$PORT" "$DATA_DIR"