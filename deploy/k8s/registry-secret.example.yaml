# P3-60: example private-registry pull secret for airgapped clusters.
# Copy and customize before apply — do not commit real credentials.
#
#   kubectl create secret docker-registry maxio-registry \
#     --docker-server=registry.internal:5000 \
#     --docker-username=maxio-pull \
#     --docker-password='...' \
#     --namespace=maxio
#
# Or apply this file after replacing placeholders:
#   sed 's/REGISTRY/registry.internal:5000/g' deploy/k8s/registry-secret.example.yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: maxio-registry
  namespace: maxio
  labels:
    app.kubernetes.io/name: maxio
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "REGISTRY": {
          "username": "maxio-pull",
          "password": "REPLACE_ME",
          "auth": "bWF4aW8tcHVsbDpSRVBMQUNFX01F"
        }
      }
    }