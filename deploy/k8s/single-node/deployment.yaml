apiVersion: apps/v1
kind: Deployment
metadata:
  name: maxio
  namespace: maxio
  labels:
    app.kubernetes.io/name: maxio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: maxio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maxio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # P3-60: required when images are hosted on a private registry (airgap).
      # Create the secret first — see deploy/k8s/registry-secret.example.yaml
      imagePullSecrets:
        - name: maxio-registry
      containers:
        - name: maxio
          image: REGISTRY/maxio:VERSION
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          args:
            - serve
            - --data-dir=/data
            - --port=9000
            - --address=0.0.0.0
            - --serve-ui
            - --metrics-enabled
          ports:
            - name: http
              containerPort: 9000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          envFrom:
            - secretRef:
                name: maxio-credentials
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: maxio-data
        - name: tmp
          emptyDir: {}