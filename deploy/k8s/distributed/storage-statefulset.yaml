apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: maxio-storage
  namespace: maxio
  labels:
    app.kubernetes.io/name: maxio
    app.kubernetes.io/component: storage
spec:
  serviceName: maxio-storage
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: maxio
      app.kubernetes.io/component: storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maxio
        app.kubernetes.io/component: storage
    spec:
      containers:
        - name: maxio
          image: REGISTRY/maxio:VERSION
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --data-dir=/data
            - --port=9100
            - --address=0.0.0.0
            - --metrics-enabled
          ports:
            - name: http
              containerPort: 9100
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi