apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: maxio-storage
  namespace: maxio
  labels:
    app.kubernetes.io/name: maxio
    app.kubernetes.io/component: storage
spec:
  serviceName: maxio-storage
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: maxio
      app.kubernetes.io/component: storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maxio
        app.kubernetes.io/component: storage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: maxio-registry
      containers:
        - name: maxio
          image: REGISTRY/maxio:VERSION
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/sh", "-ec"]
          args:
            - |
              ORD="${HOSTNAME##*-}"
              NODE_ID="$((ORD + 1))"
              exec maxio storage-raft \
                --data-dir=/data \
                --node-id="${NODE_ID}" \
                --bind=0.0.0.0:9100 \
                --advertise="${HOSTNAME}.maxio-storage:9100" \
                --peers="1=http://maxio-storage-0.maxio-storage:9100,2=http://maxio-storage-1.maxio-storage:9100,3=http://maxio-storage-2.maxio-storage:9100" \
                --voters=1,2,3 \
                --erasure-coding \
                --parity-shards=1 \
                --chunk-size=4194304 \
                $( [ "${NODE_ID}" = "1" ] && echo "--bootstrap" )
          env:
            - name: MAXIO_BITROT_SCAN_ENABLED
              value: "true"
            - name: MAXIO_BITROT_SCAN_INTERVAL_SECS
              value: "3600"
          ports:
            - name: http
              containerPort: 9100
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi