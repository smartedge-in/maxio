apiVersion: apps/v1
kind: Deployment
metadata:
  name: maxio-ui
  namespace: maxio
  labels:
    app.kubernetes.io/name: maxio
    app.kubernetes.io/component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: maxio
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maxio
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: maxio-ui
          image: REGISTRY/maxio-ui:VERSION
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5