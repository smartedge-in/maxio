apiVersion: apps/v1
kind: Deployment
metadata:
  name: maxio-server
  namespace: maxio
  labels:
    app.kubernetes.io/name: maxio
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: maxio
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maxio
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: maxio
          image: REGISTRY/maxio:VERSION
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --data-dir=/data
            - --port=9000
            - --address=0.0.0.0
            - --serve-ui=false
            - --cluster-mode
            - --metrics-enabled
          ports:
            - name: http
              containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}