# Cargo dependency license policy — enforced in CI via `cargo deny check`.
# See docs/licensing.md for rationale and UI (npm) font licensing.

[graph]
all-features = true

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
# Full graph check: make deny-all. CI / make deny use `licenses` only.
ignore = [
  # Transitive via reed-solomon-erasure → parking_lot 0.11 (Redox-only path).
  "RUSTSEC-2024-0384",
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"