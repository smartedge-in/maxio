# Cargo dependency license policy — enforced in CI via `cargo deny check`.
# See docs/licensing.md for the mandatory permissive-only requirement.
#
# REQUIREMENT: production Rust deps must use permissive licenses only.
# Prefer Apache-2.0 (project license) or equivalently permissive: MIT, BSD, ISC.
# Anything not listed in `allow` is rejected (including copyleft and non-standard IDs).
#
# Explicitly forbidden (non-exhaustive — all are denied unless added to `allow`):
#   Copyleft: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
#   Weak copyleft: MPL-2.0
#   Non-standard / non-permissive: CDLA-*, OFL-*, Proprietary, UNLICENSED

[graph]
all-features = true

[licenses]
version = 2
allow = [
  "Apache-2.0",   # preferred for new dependencies
  "MIT",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
    # P3-17 / P3-23: admin CLI must not depend on server facade crates
    { crate = "maxio-admin", deny = [
        { crate = "maxio" },
        { crate = "maxio-server" },
    ]},
    # P3-22 / P3-23: keep maxio-common thin
    { crate = "maxio-common", deny = [
        { crate = "axum" },
        { crate = "reqwest" },
        { crate = "maxio-storage" },
    ]},
]

[advisories]
# Full graph check: make deny-all. CI / make deny use `licenses` only.
ignore = [
  # Transitive via reed-solomon-erasure → parking_lot 0.11 (Redox-only path).
  "RUSTSEC-2024-0384",
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"